# ─────────────────────────────────────────────────────────────────────
# RESERVED PREFIXES (cannot be used by squads)
# ─────────────────────────────────────────────────────────────────────
# These prefixes are reserved for protocol-level use. Validators reject
# capability ids using these prefixes.
reserved_prefixes:
  - _internal
  - _meta
  - _test
  - core
  - protocol


# ─────────────────────────────────────────────────────────────────────
# DEPRECATED (slated for removal)
# ─────────────────────────────────────────────────────────────────────
# Empty in v1.0.0. Future versions will list deprecations here with
# replacement guidance and removal timeline.
deprecated: []


# ─────────────────────────────────────────────────────────────────────
# VALIDATION RULES (enforced by validators)
# ─────────────────────────────────────────────────────────────────────
validation_rules:
  capability_id_pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*){2,}$'
  # Three or more segments required: namespace.segment.verb
  # Lowercase, alphanumeric + underscore, must start with letter

  domain_pattern: '^[a-z][a-z0-9_]*$'

  max_capabilities_per_squad: 50
  max_capabilities_per_business: 100

  reserved_prefix_check: enforced
  unknown_namespace_check: enforced  # unless squad has experimental_domains: true
  unknown_domain_check: enforced     # same


# ─────────────────────────────────────────────────────────────────────
# EXAMPLES (for protocol documentation)
# ─────────────────────────────────────────────────────────────────────
examples:

  good_capability:
    id: media.video.analyze
    domains: [media, content]
    description: "Analyze video file with multimodal LLM. Extracts transcript, on-screen text, key frames."
    examples_intents:
      - "transcrever vídeo do Instagram"
      - "extrair textos da tela de um Reel"
    not_for_intents:
      - "análise de vídeo de aula educacional (use media.video.educational)"

  bad_capability_examples:
    - reason: "Generic verb-only id"
      id: do_stuff
      why_bad: "Missing namespace, missing domain segment"

    - reason: "Reserved prefix"
      id: _internal.cache.invalidate
      why_bad: "Uses reserved prefix _internal"

    - reason: "Unknown domain without experimental flag"
      id: marketing.campaign.full_funnel
      domains: [vibes]   # not in canonical
      why_bad: "Domain 'vibes' not in catalog and squad missing experimental_domains: true"

    - reason: "Single segment"
      id: marketing
      why_bad: "Needs namespace.segment.verb (3 segments minimum)"


# ─────────────────────────────────────────────────────────────────────
# GOVERNANCE
# ─────────────────────────────────────────────────────────────────────
governance:
  authoritative_file: ~/.claude/skills/_shared/catalogs/CAPABILITY_CATALOG_V1.yaml
  proposal_process:
    1: "Open file edit PR with addition"
    2: "Justify why existing entries don't fit"
    3: "Reviewed by protocol authors"
    4: "Merged into next minor version"

  removal_process:
    1: "Mark as deprecated in catalog (next minor)"
    2: "Squads using removed entries flagged at index time"
    3: "After 1 minor version: remove entirely (next minor+1)"

  experimental_track:
    1: "Squad declares experimental_domains: true in squad.yaml"
    2: "Capability ids using non-catalog domains accepted"
    3: "Discovery score boost: 0.7x penalty"
    4: "Excluded from cross-business routing"
    5: "Promotion to canonical: open governance PR"
