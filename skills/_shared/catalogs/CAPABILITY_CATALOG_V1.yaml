# Canonical Capability Catalog v1
#
# Source of truth for the controlled vocabulary used in Squad Protocol v5
# (capabilities[].domains, capabilities[].id namespaces) and Business Protocol v1
# (business.capabilities, business.domains).
#
# Squads/businesses MAY use entries marked experimental: true for testing,
# but they receive a 0.7x score boost penalty in discovery and are excluded
# from cross-business routing.
#
# Governance:
# - Additions: PR against this file, reviewed by protocol authors
# - Removals: deprecation cycle of one minor version
# - Squads using removed entries are flagged at index time

version: "1.0.0"
protocol_compatibility:
  squad: "5.0"
  business: "1.0"
  harness: "1.0"
generated_at: "2026-05-02"
status: stable

