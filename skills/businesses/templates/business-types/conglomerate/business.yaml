name: example-conglomerate
version: 1.0.0
protocol: '1.0'
description: 'Conglomerate business: a holding-CEO oversees N sub-business CEOs. Each
  sub-business may have its own internal hierarchy referenced by slug. Use as base
  for multi-vertical conglomerates, holdings with portfolio companies, or distributed
  multi-business setups (e.g. AlienTech 360).'
author: businesses-skill
license: SUL-1.0
domains:
- strategy
- business_operations
employee_count: 4
authority_level: tier-3
operation_mode: zero_human
runtime_requirements:
  minimum:
  - runtime: claude-code
    version: '>=1.0.0'
  compatible:
  - runtime: codex
    version: '>=0.20.0'
  - runtime: gemini-cli
    version: '>=0.4.0'
  - runtime: antigravity-cli  # +antigravity-cli (sucessor; gemini-cli sunset 2026-06-18 consumer)
    version: '>=0.4.0'
features_required:
- max_turns
- tool_whitelist
- subagent_spawning
- handoff_artifacts
- audit_trail
memory:
  permanent:
    enabled: true
    files:
    - permanent.md
    garbage_collection:
      max_facts: 200
      review_interval_days: 60
      conflict_resolution: replace
  project:
    isolation: by_construction
ui:
  client_facing_name: Conglomerate Business (Example)
  category: general
  pitch: Template conglomerate — Holding CEO + N business CEOs. Bom para holdings,
    conglomerados multi-vertical e portfolios de empresas.
