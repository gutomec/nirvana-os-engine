name: example-solo
version: 1.0.0
protocol: "1.0"
description: >
  Business solo de exemplo. Single-employee setup que funciona como prova de
  conceito mínima. Use como base para criar businesses customizadas via wizard
  (*business init <name> --template solo).
author: businesses-skill
license: MIT

domains:
  - strategy
  - business_operations

employee_count: 1
authority_level: tier-3
operation_mode: zero_human

runtime_requirements:
  minimum:
    - { runtime: claude-code, version: ">=1.0.0" }
  compatible:
    - { runtime: codex, version: ">=0.20.0" }
    - { runtime: gemini-cli, version: ">=0.4.0" }
    - { runtime: antigravity-cli, version: ">=0.4.0" }  # +antigravity-cli (sucessor; gemini-cli sunset 2026-06-18 consumer)

features_required:
  - max_turns
  - tool_whitelist
  - subagent_spawning
  - handoff_artifacts
  - audit_trail

memory:
  permanent:
    enabled: true
    files:
      - permanent.md
    garbage_collection:
      max_facts: 200
      review_interval_days: 60
      conflict_resolution: replace
  project:
    isolation: by_construction

ui:
  client_facing_name: "Solo Business (Example)"
  category: general
  pitch: "Template solo — 1 employee CEO que faz tudo. Substitua pela sua business real."
